{% extends "base.html" %}
{% block title %}Menu Unavailable — {{ restaurant.name }}{% endblock %}

{% block body %}
<div class="min-h-screen bg-[#0A0A0A] flex items-center justify-center px-6">
  <div class="text-center">
    <div class="w-16 h-16 bg-white/5 rounded-2xl flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-medium text-white mb-2" style="font-family:'Fraunces',serif;">{{ restaurant.name }}</h1>
    <p class="text-white/50 mb-6">This restaurant's menu is temporarily unavailable.</p>
    <p class="text-white/30 text-sm">Please ask restaurant staff for assistance.</p>
  </div>
</div>
{% endblock %}
