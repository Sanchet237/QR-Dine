services:
  - type: web
    name: qrdine
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn qrdine.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    plan: free

    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render auto-generates a secure secret
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "qr-dine-15cf.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://qr-dine-15cf.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: qrdine-db
          property: connectionString
      - key: CLOUDINARY_URL
        sync: false                # Set manually in Render dashboard
      - key: ADMIN_EMAIL
        value: "admin@qrdine.com"
      - key: ADMIN_PASSWORD
        sync: false                # Set manually in Render dashboard

databases:
  - name: qrdine-db
    plan: free
